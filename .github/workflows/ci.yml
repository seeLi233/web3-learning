# ============================================
# CI Workflow — DeFiAggregator
# 每次 push / PR / 合并到 main 时自动运行
# ============================================

name: CI

on:
  push:
    branches: [main]        # 推送到 main 分支时触发
  pull_request:
    branches: [main]        # 创建指向 main 的 PR 时触发

jobs:
  # ──────────────────────────────────────────
  # Job 1: 编译 + 测试
  # ──────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DeFiAggregator  # 所有命令在子目录下执行

    steps:
      # Step 1: 把仓库代码拉到虚拟机上
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3: 安装项目依赖
      - name: Install dependencies
        run: npm ci

      # Step 4: 编译 Solidity 合约
      - name: Compile contracts
        run: npx hardhat compile

      # Step 5: 运行测试
      - name: Run tests
        run: npx hardhat test

  # ──────────────────────────────────────────
  # Job 2: 代码风格检查（与 Job 1 并行执行）
  # ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DeFiAggregator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Solidity 代码风格检查
      - name: Lint Solidity
        run: npm run lint:sol

      # TypeScript 代码风格检查
      - name: Lint TypeScript
        run: npm run lint:ts

  # ──────────────────────────────────────────
  # Job 3: Gas 报告（测试通过后才跑）
  # ──────────────────────────────────────────
  gas-report:
    name: Gas Report
    runs-on: ubuntu-latest
    needs: build-and-test

    defaults:
      run:
        working-directory: DeFiAggregator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # 跑测试，同时把输出保存到文件
      - name: Generate gas report
        run: npx hardhat test 2>&1 | tee gas-report.txt

      # 上传报告 → 之后可以从 GitHub Actions 页面下载
      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: DeFiAggregator/gas-report.txt   # 路径要加上子目录

  # ──────────────────────────────────────────
  # Job 4: Solidity 测试覆盖率（用 Foundry）
  # ──────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DeFiAggregator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 需要 node_modules 来解析 OpenZeppelin 等 npm 包
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # 一键安装 Foundry 工具链
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # 运行覆盖率分析（--ir-minimum 解决 DeFiDex 等复杂合约的栈溢出）
      - name: Run coverage
        run: forge coverage --report lcov --ir-minimum

      # 上传覆盖率报告
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: DeFiAggregator/lcov.info
